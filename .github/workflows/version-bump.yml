name: Version Bump

on:
  push:
    branches:
      - main
      - personal

jobs:
  bump-version:
    # Avoid re-bumping on the bot's own "chore: bump version to …" commits (would loop forever).
    if: ${{ github.event.head_commit == null || !startsWith(github.event.head_commit.message, 'chore: bump version to ') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get current version
        id: current_version
        run: |
          if [ -f VERSION ]; then
            VERSION=$(cat VERSION | tr -d '\n')
          else
            VERSION="0.0.0"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION"

      - name: Determine version bump type
        id: bump_type
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          echo "Commit message: $COMMIT_MSG"

          if echo "$COMMIT_MSG" | grep -qiE "^(breaking|major):|\[major\]|BREAKING CHANGE"; then
            echo "bump=major" >> $GITHUB_OUTPUT
            echo "Bump type: major"
          elif echo "$COMMIT_MSG" | grep -qiE "^(feat|feature|minor):|\[minor\]|\[feat\]"; then
            echo "bump=minor" >> $GITHUB_OUTPUT
            echo "Bump type: minor"
          elif echo "$COMMIT_MSG" | grep -qiE "^(fix|patch|docs|style|refactor|perf|test|chore):|\[patch\]|\[fix\]"; then
            echo "bump=patch" >> $GITHUB_OUTPUT
            echo "Bump type: patch"
          else
            echo "bump=patch" >> $GITHUB_OUTPUT
            echo "Bump type: patch (default)"
          fi

      - name: Bump version
        id: new_version
        run: |
          VERSION="${{ steps.current_version.outputs.version }}"
          BUMP="${{ steps.bump_type.outputs.bump }}"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          case $BUMP in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      - name: Update VERSION file and index.html
        run: |
          NEW_VERSION="${{ steps.new_version.outputs.new_version }}"
          echo "$NEW_VERSION" > VERSION

          sed -i 's/<p class="footer__version">v[0-9]*\.[0-9]*\.[0-9]*<\/p>/<p class="footer__version">v'"$NEW_VERSION"'<\/p>/' index.html

      - name: Commit and tag
        id: commit_tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet VERSION; then
            echo "No version change needed"
            echo "skipped=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          NEW_VERSION="${{ steps.new_version.outputs.new_version }}"

          git add VERSION index.html
          git commit -m "chore: bump version to ${NEW_VERSION}"
          git tag -a "v${NEW_VERSION}" -m "Version ${NEW_VERSION}"
          git push origin HEAD --tags
          echo "skipped=false" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: steps.commit_tag.outputs.skipped != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_VERSION: ${{ steps.new_version.outputs.new_version }}
          PREV_VERSION: ${{ steps.current_version.outputs.version }}
          BUMP: ${{ steps.bump_type.outputs.bump }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          REPO: ${{ github.repository }}
        run: |
          case $BUMP in
            major)
              RELEASE_TITLE="Major Release v${NEW_VERSION}"
              ;;
            minor)
              RELEASE_TITLE="Feature Release v${NEW_VERSION}"
              ;;
            patch)
              RELEASE_TITLE="Patch Release v${NEW_VERSION}"
              ;;
          esac

          RELEASE_NOTES="## What's Changed

          ${COMMIT_MSG}

          **Full Changelog**: https://github.com/${REPO}/compare/v${PREV_VERSION}...v${NEW_VERSION}"

          gh release create "v${NEW_VERSION}" \
            --title "${RELEASE_TITLE}" \
            --notes "${RELEASE_NOTES}" \
            --latest
